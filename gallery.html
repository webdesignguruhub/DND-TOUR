  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(18px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .fade-in-up {
      animation: fadeInUp 0.7s ease-out both;
    }

    /* Masonry */
    .masonry {
      column-count: 1;
      column-gap: 1rem;
    }
    @media (min-width: 640px) {
      .masonry { column-count: 2; }
    }
    @media (min-width: 1024px) {
      .masonry { column-count: 3; }
    }
    .masonry-item {
      break-inside: avoid;
      margin-bottom: 1rem;
    }

    /* Lightbox */
    #lightbox { display: none; }
    #lightbox.active { display: flex; }

    /* ===== GALLERY ENHANCEMENTS ===== */
.masonry {
  column-count: 1;
  column-gap: 1rem;
}
@media (min-width: 640px) {
  .masonry { column-count: 2; }
}
@media (min-width: 1024px) {
  .masonry { column-count: 3; }
}
.masonry-item {
  break-inside: avoid;
  margin-bottom: 1rem;
  position: relative;
  overflow: hidden;
  border-radius: 1rem;
}

/* STRONG hover zoom */
.masonry-item img {
  transition: transform 0.8s ease;
}
.masonry-item:hover img {
  transform: scale(1.15);
}

/* Watermark */
.watermark {
  position: absolute;
  bottom: 10px;
  right: 10px;
  background: rgba(0,0,0,0.6);
  color: white;
  font-size: 10px;
  padding: 4px 8px;
  border-radius: 6px;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.masonry-item:hover .watermark {
  opacity: 1;
}

/* Lightbox */
#lightbox {
  display: none;
}
#lightbox.active {
  display: flex;
}

  </style>


</head>

<main class="flex-1">

<!-- HERO (UNCHANGED) -->
<section class="bg-gradient-to-b from-slate-100 to-slate-50 border-b border-slate-200">

<!-- ✅ GALLERY (ONLY SECTION CHANGED) -->
<section class="py-12 md:py-16 bg-slate-50">
  <div class="max-w-6xl mx-auto px-4 md:px-8 fade-in-up">
    <div class="masonry" id="gallery">

      <!-- ALL IMAGES -->
      <!-- Each block identical behaviour -->
      <script>
        const images = [
          "WhatsApp Image 2025-12-19 at 10.20.53 AM (2).jpeg",
          "WhatsApp Image 2025-12-19 at 10.20.49 AM.jpeg",
          "WhatsApp Image 2025-12-19 at 10.20.51 AM.jpeg",
          "WhatsApp Image 2025-12-19 at 10.20.53 AM (1).jpeg",
          "WhatsApp Image 2025-12-19 at 10.21.14 AM.jpeg",
          "WhatsApp Image 2025-12-19 at 10.21.13 AM (2).jpeg",
          "WhatsApp Image 2025-12-19 at 10.20.54 AM (1).jpeg",
          "WhatsApp Image 2025-12-19 at 10.20.54 AM.jpeg",
          "WhatsApp Image 2025-12-19 at 10.20.55 AM (1).jpeg",
          "WhatsApp Image 2025-12-19 at 10.21.12 AM (1).jpeg",
          "WhatsApp Image 2025-12-19 at 10.21.11 AM.jpeg",
          "WhatsApp Image 2025-12-19 at 10.20.56 AM.jpeg"
        ];

        document.write(
          images.map(img => `
            <div class="masonry-item group relative overflow-hidden rounded-2xl shadow-sm cursor-pointer">
              <img src="public/assets/customer pics/${img}"
                   class="w-full transition-transform duration-700 group-hover:scale-110"
                   onclick="openLightbox(this.src)">
              <div class="absolute bottom-2 right-2 opacity-0 group-hover:opacity-100 transition">
                <span class="text-[10px] bg-black/60 text-white px-2 py-1 rounded">D & D Tours</span>
              </div>
            </div>
          `).join("")
        );
      </script>

    </div>
  </div>
</section>

<!-- LIGHTBOX -->
<div id="lightbox" class="fixed inset-0 bg-black/90 z-50 hidden items-center justify-center">
  <img id="lightbox-img" class="max-w-[90vw] max-h-[90vh] rounded-xl shadow-lg">
</div>

<script>
  /* Lightbox */
  function openLightbox(src) {
    stopAuto();
    document.getElementById("lightbox-img").src = src;
    document.getElementById("lightbox").classList.add("active");
  }
  document.getElementById("lightbox").onclick = () =>
    document.getElementById("lightbox").classList.remove("active");

  /* Auto scroll (stops on interaction) */
  let auto = true;
  function stopAuto(){ auto = false; }

  const imgs = () => document.querySelectorAll("#gallery img");
  let i = 0;

  setInterval(() => {
    if (!auto || !imgs().length) return;
    imgs()[i].scrollIntoView({ behavior: "smooth", block: "center" });
    i = (i + 1) % imgs().length;
  }, 5000);

  ["touchstart","mousedown","wheel"].forEach(e =>
    window.addEventListener(e, stopAuto, { passive: true })
  );

  /* Swipe */
  let sx = 0;
  gallery.addEventListener("touchstart", e => sx = e.touches[0].clientX, { passive:true });
  gallery.addEventListener("touchend", e => {
    const dx = sx - e.changedTouches[0].clientX;
    if (Math.abs(dx) < 50) return;
    stopAuto();
    i = dx > 0 ? i + 1 : i - 1;
    if (i < 0) i = imgs().length - 1;
    imgs()[i % imgs().length].scrollIntoView({ behavior:"smooth", block:"center" });
  });
</script>
<!-- LIGHTBOX -->
<div id="lightbox" class="fixed inset-0 bg-black/90 z-50 items-center justify-center">
  <img id="lightbox-img" class="max-w-[90vw] max-h-[90vh] rounded-xl">
</div>

<script>
  const gallery = document.getElementById("gallery");
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");

  /* Lightbox */
  function openLightbox(src) {
    stopAutoScroll();
    lightboxImg.src = src;
    lightbox.classList.add("active");
  }
  lightbox.onclick = () => lightbox.classList.remove("active");

  /* Auto scroll */
  let autoScroll = true;
  let index = 0;

  function stopAutoScroll() {
    autoScroll = false;
  }

  const imgs = () => gallery.querySelectorAll("img");

  setInterval(() => {
    if (!autoScroll || !imgs().length) return;
    imgs()[index].scrollIntoView({ behavior: "smooth", block: "center" });
    index = (index + 1) % imgs().length;
  }, 4000);

  /* Stop auto scroll on ANY interaction */
  ["touchstart","mousedown","wheel","keydown"].forEach(e =>
    window.addEventListener(e, stopAutoScroll, { passive: true })
  );

  /* Swipe gestures */
  let startX = 0;
  gallery.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    stopAutoScroll();
  }, { passive: true });

  gallery.addEventListener("touchend", e => {
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) < 50) return;

    index = diff > 0 ? index + 1 : index - 1;
    if (index < 0) index = imgs().length - 1;

    imgs()[index % imgs().length].scrollIntoView({
      behavior: "smooth",
      block: "center"
    });
  });
</script>
